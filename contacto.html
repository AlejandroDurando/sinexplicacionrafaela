<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SER - Centro Testimonial de Fenómenos Inexplicables</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="hero-font.css" rel="stylesheet">

    <!-- Matter.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
        }

        /* Preloader */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--black);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
        }

        .abduction-scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            justify-content: flex-start;
        }

        .preloader-ufo {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            /* Animation removed to keep the image static as requested */
        }

        .preloader-person {
            position: absolute;
            bottom: 10vh;
            z-index: 3;
            height: 15vh;
            max-height: 150px;
            width: auto;
            animation: abductPerson 6s infinite ease-in-out forwards;
            filter: drop-shadow(0 0 10px rgba(150, 255, 150, 0.6));
        }

        .preloader-text {
            position: absolute;
            bottom: 5vh;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: preloaderPulse 2s infinite alternate ease-in-out;
            z-index: 4;
            opacity: 0.7;
        }





        @keyframes abductPerson {
            0% {
                bottom: 10vh;
                transform: scale(1) translateY(0);
                opacity: 0;
            }

            10% {
                bottom: 10vh;
                transform: scale(1) translateY(0);
                opacity: 1;
            }

            20% {
                bottom: 10vh;
                transform: scale(1) translateY(-10px);
                opacity: 1;
            }

            75% {
                bottom: 65vh;
                transform: scale(0.4) translateY(0);
                opacity: 1;
            }

            90% {
                bottom: 85vh;
                transform: scale(0.1) translateY(0);
                opacity: 0;
            }

            100% {
                bottom: 85vh;
                transform: scale(0) translateY(0);
                opacity: 0;
            }
        }

        @keyframes preloaderPulse {
            0% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        /* Nav */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 0.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background-color: var(--white);
        }

        nav img {
            height: 110px;
            cursor: pointer;
            filter: grayscale(100%);
            transition: transform 0.3s;
        }

        nav img:hover {
            transform: scale(1.1);
        }

        nav .links a {
            color: var(--black);
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            transition: color 0.3s;
        }

        nav .links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--black);
            transition: width 0.3s ease;
        }

        nav .links a:hover::after {
            width: 100%;
        }

        /* Hero */
        .hero {
            margin-top: 130px;
            background-color: var(--black);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 130px);
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.8;
            /* Slightly darkened to let text pop */
        }

        .hero-text-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
            padding: 0 2rem;
            margin-bottom: 12vh;
            /* Lift the entire text block higher up the screen */
        }

        .hero-title {
            width: 90%;
            max-width: 800px;
            height: auto;
            opacity: 0;
            animation: fadeInSmooth 1.5s ease-in-out 3s forwards;
            margin-bottom: 0.5rem;
            /* Reduced to bring subtitle closer */
            filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.8));
        }

        .hero-subtitle {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1.2vw;
            width: 100%;
        }

        .typewriter-part {
            height: clamp(16px, 3.5vw, 45px);
            /* Slightly smaller so it fits nicely on 1 line */
            width: auto;
            object-fit: contain;
            flex-shrink: 0;
            filter: drop-shadow(0px 3px 5px rgba(0, 0, 0, 0.8));
        }

        /* Set animation timings 1 second after the main title starts appearing (3s + 1s = 4s) 
           Made slower as per user request */
        .part-1 {
            animation: typeWriterReveal 1.0s linear 4.0s both;
        }

        .part-2 {
            animation: typeWriterReveal 1.6s linear 5.0s both;
        }

        .part-3 {
            animation: typeWriterReveal 1.2s linear 6.6s both;
        }

        @keyframes fadeInSmooth {
            to {
                opacity: 1;
            }
        }

        @keyframes typeWriterReveal {
            0% {
                opacity: 1;
                clip-path: inset(0 100% 0 0);
            }

            100% {
                opacity: 1;
                clip-path: inset(0 0 0 0);
            }
        }

        .hero h1 span:nth-child(2),
        .hero h1 span:nth-child(3) {
            font-size: 0.65em;
        }

        /* Sections common */
        section {
            padding: 8rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 60vh;
        }

        h2 {
            font-family: 'Anton', sans-serif;
            font-size: 4rem;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            max-width: 700px;
            font-size: 1.2rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        /* Testimonio y Grabaciones */
        #testimonio {
            background-color: var(--white);
            color: var(--black);
        }

        .grabaciones-container {
            margin-top: 4rem;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
        }

        .audio-item {
            width: 100%;
            padding: 1.5rem;
            border: 3px solid var(--black);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            text-align: left;
        }

        .audio-item p {
            margin-bottom: 0;
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
        }

        audio {
            width: 100%;
            height: 40px;
            filter: grayscale(100%) contrast(150%);
        }

        /* Sobre Nosotros */
        #sobre-nosotros {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), url('assets/fondo_contacto.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--white);
        }

        /* Contacto */
        #contacto {
            background-color: var(--white);
            color: var(--black);
        }

        form {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
            gap: 1.5rem;
        }

        input,
        textarea {
            width: 100%;
            padding: 1rem;
            border: 3px solid var(--black);
            background: transparent;
            color: var(--black);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            border-radius: 0;
        }

        input::placeholder,
        textarea::placeholder {
            color: #666;
            font-weight: 400;
        }

        textarea {
            resize: vertical;
            min-height: 180px;
        }

        button {
            padding: 1.2rem 2rem;
            background-color: var(--black);
            color: var(--white);
            border: 3px solid var(--black);
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 0;
        }

        button:hover {
            background-color: var(--white);
            color: var(--black);
        }

        /* Antigravity hidden classes */
        .falling-element {
            position: fixed !important;
            margin: 0 !important;
            z-index: 9999 !important;
            box-sizing: border-box !important;
            transform-origin: center center;
            will-change: transform;
            /* Invert on overlap against black background */
            color: var(--white) !important;
            background-color: transparent !important;
            mix-blend-mode: difference !important;
        }

        .falling-border {
            border: 3px solid var(--white) !important;
            outline: none !important;
        }

        /* Footer */
        footer {
            background-color: var(--black);
            color: var(--white);
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            text-align: center;
        }

        .footer-logo {
            height: 80px;
            filter: grayscale(100%) invert(1);
            opacity: 0.8;
        }

        .footer-tagline {
            font-family: 'Anton', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #aaa;
            margin: 0;
        }

        .footer-social a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 1px;
            border: 2px solid var(--white);
            padding: 0.6rem 1.4rem;
            transition: all 0.3s;
        }

        .footer-social a:hover {
            background-color: var(--white);
            color: var(--black);
        }

        .footer-divider {
            width: 60px;
            height: 2px;
            background-color: #444;
            border: none;
        }

        .footer-copy {
            font-size: 0.8rem;
            color: #555;
            margin: 0;
        }

        /* Scroll Animations */
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Prevent Matter.js breaking due to opacity 0 elements */
        .falling-element.reveal {
            opacity: 1 !important;
            transform: none !important;
            transition: none !important;
        }

        /* UFO Navbar Animation */
        #ufo {
            position: absolute;
            top: 50%;
            left: -120px;
            transform: translateY(-50%);
            font-size: 3rem;
            pointer-events: none;
            z-index: 200;
            opacity: 0;
            filter: drop-shadow(0 0 8px rgba(150, 220, 255, 0.8));
        }

        @keyframes ufoFly {
            0% {
                left: -120px;
                opacity: 0;
                transform: translateY(-50%) scaleX(1);
            }

            5% {
                opacity: 1;
            }

            48% {
                transform: translateY(-50%) scaleX(1);
            }

            50% {
                transform: translateY(-50%) scaleX(-1);
            }

            95% {
                opacity: 1;
            }

            100% {
                left: calc(100% + 120px);
                opacity: 0;
                transform: translateY(-50%) scaleX(-1);
            }
        }

        #ufo.flying {
            animation: ufoFly 8s ease-in-out forwards;
        }

        /* Hamburger Menu Icon */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 200;
        }

        .menu-toggle span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: var(--black);
            transition: all 0.3s ease;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            nav {
                flex-direction: row;
                padding: 0.5rem 1rem;
                justify-content: space-between;
                align-items: center;
            }

            nav img {
                height: 60px;
            }

            .menu-toggle {
                display: flex;
            }

            .menu-toggle.active span:nth-child(1) {
                transform: translateY(8px) rotate(45deg);
            }

            .menu-toggle.active span:nth-child(2) {
                opacity: 0;
            }

            .menu-toggle.active span:nth-child(3) {
                transform: translateY(-8px) rotate(-45deg);
            }

            nav .links {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background-color: var(--white);
                padding: 0;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease-in-out;
                border-bottom: 0px solid var(--black);
            }

            nav .links.active {
                max-height: 300px;
                padding: 1.5rem 0;
                border-bottom: 3px solid var(--black);
            }

            nav .links a {
                margin: 0;
                padding: 1rem 0;
                text-align: center;
                font-size: 1.2rem;
                width: 100%;
            }

            nav .links a::after {
                display: none;
            }

            .hero {
                margin-top: 76px;
                min-height: 55vh;
                /* Reduced height on mobile to prevent excessive space */
            }

            .hero-bg {
                /* Shifts the image downwards inside the container, hiding the top portion */
                object-position: center 70%;
            }

            section {
                padding: 5rem 1.5rem;
            }

            h2 {
                font-size: 3rem;
            }

            p {
                font-size: 1.1rem;
            }

            #sobre-nosotros {
                background-attachment: scroll;
                background-position: center;
                background-size: cover;
                background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), url('assets/fondo_contacto_2.jpg');
            }

            #ufo {
                font-size: 2rem;
            }

            .footer-social a {
                font-size: 0.9rem;
                padding: 0.5rem 1rem;
            }
        }
    </style>
</head>

    <!-- Scripts -->
    <script>
        // Preloader Logic
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            // Give it a tiny minimum duration so the animation can be appreciated
            setTimeout(() => {
                preloader.style.opacity = '0';
                preloader.style.visibility = 'hidden';
            }, 2500);
        });

        document.addEventListener('DOMContentLoaded', () => {

            // Scroll Reveal Animation
            const revealElements = document.querySelectorAll('.reveal');

            const revealObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, {
                root: null,
                threshold: 0.15,
                rootMargin: "0px 0px -50px 0px"
            });

            revealElements.forEach(el => revealObserver.observe(el));

            // UFO Navbar Animation
            const ufo = document.getElementById('ufo');
            function launchUFO() {
                ufo.classList.remove('flying');
                void ufo.offsetWidth; // force reflow to restart animation
                ufo.classList.add('flying');
                ufo.addEventListener('animationend', () => {
                    ufo.classList.remove('flying');
                }, { once: true });
            }
            // First flight after 5 seconds, then every 30 seconds
            setTimeout(() => {
                launchUFO();
                setInterval(launchUFO, 30000);
            }, 5000);

            // Matter.js Antigravity Script
            const logo = document.getElementById('logo');
            let antigravityActive = false;
            let clickTimeout;

            // Hamburger menu functionality
            const mobileMenu = document.getElementById('mobile-menu');
            const navLinks = document.getElementById('nav-links');
            const links = navLinks.querySelectorAll('a');

            mobileMenu.addEventListener('click', () => {
                mobileMenu.classList.toggle('active');
                navLinks.classList.toggle('active');
            });

            // Close when clicking a link
            links.forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.classList.remove('active');
                    navLinks.classList.remove('active');
                });
            });

            logo.addEventListener('click', (e) => {
                const logoLink = logo.closest('a');
                e.preventDefault();
                if (antigravityActive) return;

                if (!clickTimeout) {
                    clickTimeout = setTimeout(() => {
                        window.location.href = logoLink.href;
                    }, 300);
                }
            });

            logo.addEventListener('dblclick', (e) => {
                e.preventDefault();
                if (clickTimeout) {
                    clearTimeout(clickTimeout);
                    clickTimeout = null;
                }
                if (antigravityActive) return;
                antigravityActive = true;

                // Instantly scroll to top for exact positioning mapping
                window.scrollTo({ top: 0, left: 0, behavior: 'instant' });

                // Tiny delay to ensure scroll resets before calculating bounds
                setTimeout(initAntigravity, 50);
            });

            function initAntigravity() {
                // Lock scrolling
                document.body.style.overflow = 'hidden';

                const Engine = Matter.Engine,
                    Render = Matter.Render,
                    Runner = Matter.Runner,
                    Bodies = Matter.Bodies,
                    Composite = Matter.Composite,
                    Mouse = Matter.Mouse,
                    MouseConstraint = Matter.MouseConstraint;

                const engine = Engine.create();
                const world = engine.world;

                // Elements that will participate in physics
                const selectors = 'h1 span, h2, p, strong, input, textarea, button, .links a, img, .audio-item, audio';
                const elements = document.querySelectorAll(selectors);
                const domBodies = [];

                elements.forEach(el => {
                    const rect = el.getBoundingClientRect();

                    // Skip if hidden or too small
                    if (rect.width < 5 || rect.height < 5 || document.defaultView.getComputedStyle(el).display === 'none') {
                        return;
                    }

                    // Save computed typography styles to freeze their appearance
                    const css = window.getComputedStyle(el);
                    const styles = {
                        fontSize: css.fontSize,
                        fontFamily: css.fontFamily,
                        fontWeight: css.fontWeight,
                        lineHeight: css.lineHeight,
                        letterSpacing: css.letterSpacing,
                        textTransform: css.textTransform,
                        textAlign: css.textAlign,
                        padding: css.padding,
                        display: css.display,
                        alignItems: css.alignItems,
                        justifyContent: css.justifyContent
                    };

                    // Matter JS Body
                    const x = rect.left + rect.width / 2;
                    const y = rect.top + rect.height / 2;
                    const body = Bodies.rectangle(x, y, rect.width, rect.height, {
                        restitution: 0.6, // Bounciness
                        friction: 0.1,
                        density: 0.005
                    });

                    Composite.add(world, body);

                    domBodies.push({
                        body: body,
                        element: el,
                        width: rect.width,
                        height: rect.height,
                        savedStyles: styles
                    });
                });

                // Remove structural background containers
                const wrapper = document.getElementById('wrapper');
                const nav = document.getElementById('navbar');
                wrapper.style.display = 'none';
                nav.style.display = 'none';

                // Paint the whole background pure black for UFO vibe
                document.body.style.backgroundColor = '#000000';
                document.body.style.backgroundImage = 'none';

                // Re-attach elements directly to body and apply fixed fall styles
                domBodies.forEach(item => {
                    const el = item.element;
                    const style = item.savedStyles;

                    document.body.appendChild(el);

                    el.className = 'falling-element';
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'BUTTON') {
                        el.classList.add('falling-border');
                    }

                    el.style.width = item.width + 'px';
                    el.style.height = item.height + 'px';
                    el.style.fontSize = style.fontSize;
                    el.style.fontFamily = style.fontFamily;
                    el.style.fontWeight = style.fontWeight;
                    el.style.lineHeight = style.lineHeight;
                    el.style.letterSpacing = style.letterSpacing;
                    el.style.textTransform = style.textTransform;
                    el.style.textAlign = style.textAlign;
                    el.style.padding = style.padding;

                    if (style.display === 'flex') {
                        el.style.display = style.display;
                        el.style.alignItems = style.alignItems;
                        el.style.justifyContent = style.justifyContent;
                    }

                    // Initial position
                    const x = item.body.position.x - item.width / 2;
                    const y = item.body.position.y - item.height / 2;
                    el.style.transform = `translate(${x}px, ${y}px) rotate(0rad)`;
                });

                // Invisible walls/floor
                const wallOpts = { isStatic: true };
                const tb = 100;
                const w = window.innerWidth;
                const h = window.innerHeight;

                Composite.add(world, [
                    Bodies.rectangle(w / 2, h + tb / 2, w * 2, tb, wallOpts),
                    Bodies.rectangle(w / 2, -tb / 2 - 2000, w * 2, tb, wallOpts),
                    Bodies.rectangle(-tb / 2, h / 2, tb, h * 3, wallOpts),
                    Bodies.rectangle(w + tb / 2, h / 2, tb, h * 3, wallOpts)
                ]);

                // Update DOM position
                Matter.Events.on(engine, 'afterUpdate', () => {
                    domBodies.forEach(item => {
                        const x = item.body.position.x - item.width / 2;
                        const y = item.body.position.y - item.height / 2;
                        item.element.style.transform = `translate(${x}px, ${y}px) rotate(${item.body.angle}rad)`;
                    });
                });

                // Mouse Drag Interaction
                const mouse = Mouse.create(document.body);
                const mouseConstraint = MouseConstraint.create(engine, {
                    mouse: mouse,
                    constraint: {
                        stiffness: 0.2,
                        render: { visible: false }
                    }
                });

                if (mouseConstraint.mouse.element) {
                    mouseConstraint.mouse.element.removeEventListener('mousewheel', mouseConstraint.mouse.mousewheel);
                    mouseConstraint.mouse.element.removeEventListener('DOMMouseScroll', mouseConstraint.mouse.mousewheel);
                }

                Composite.add(world, mouseConstraint);

                Runner.run(Runner.create(), engine);
            }
        });
    </script>
